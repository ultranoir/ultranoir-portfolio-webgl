<!-- Post-process inverse spherize shader -->
<script id="post-vertex" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
</script>
<script id="post-fragment" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;
uniform sampler2D uScene;
uniform float uStrength;
uniform vec2 uCenter;

void main() {
  vec2 uv = vUv;
  vec2 center = uCenter;
  vec2 toCenter = uv - center;
  float dist = length(toCenter);

  // Soft spherical hole: center shrinks away, smooth bowl curve
  float maxDist = 0.7;
  float normDist = clamp(dist / maxDist, 0.0, 1.0);
  // Quadratic: edges stay, center compresses — things recede smoothly
  float expand = 1.0 + uStrength * (1.0 - normDist) * (1.0 - normDist);
  vec2 distortedUV = center + toCenter * expand;

  // Clamp to avoid sampling outside
  distortedUV = clamp(distortedUV, 0.0, 1.0);

  // Subtle chromatic aberration that increases with strength
  float chromatic = uStrength * 0.003 * dist;
  vec3 color;
  color.r = texture2D(uScene, center + (distortedUV - center) * (1.0 + chromatic)).r;
  color.g = texture2D(uScene, distortedUV).g;
  color.b = texture2D(uScene, center + (distortedUV - center) * (1.0 - chromatic)).b;

  gl_FragColor = vec4(color, 1.0);
}
</script>

<!-- Background shader -->
<script id="bg-vertex" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
</script>
<script id="bg-fragment" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uTrailPos[20];
uniform float uTrailStrength[20];
uniform float uSpherize;
uniform vec2 uCubeScreenPos;

vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                      -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

float fbm(vec2 p) {
  float val = 0.0;
  float amp = 0.5;
  float freq = 1.0;
  for (int i = 0; i < 5; i++) {
    val += amp * abs(snoise(p * freq));
    freq *= 2.0;
    amp *= 0.5;
  }
  return val;
}

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

void main() {
  vec2 uv = vUv;

  // --- Water ripple: fading trail ---
  for (int i = 0; i < 20; i++) {
    vec2 toPoint = uv - uTrailPos[i];
    float d = length(toPoint);
    vec2 dir = d > 0.001 ? toPoint / d : vec2(0.0);
    float inf = smoothstep(0.15, 0.0, d) * uTrailStrength[i];
    uv += dir * inf * 0.025;
  }

  // Spherize distortion on background UVs (center follows cube)
  vec2 center = uCubeScreenPos;
  vec2 delta = uv - center;
  float dist2 = length(delta);
  float warpAmount = uSpherize * 15.0;
  uv = center + delta * (1.0 + warpAmount * dist2);

  // Turbulence FBM (zoomed in)
  vec2 zUv = uv * 0.4 + 0.3; // zoom: center 40% of pattern
  vec2 mouse = uMouse * 0.05;
  vec2 warp = vec2(
    fbm(zUv * 1.2 + uTime * 0.05 + mouse),
    fbm(zUv * 1.2 + uTime * 0.05 + 10.0 + mouse * 0.8)
  );
  float n = fbm(zUv * 1.5 + warp * 0.6);

  // 5 stops: #0f0f0f → noir → #0f0f0f → noir → #0f0f0f
  float s = n * 4.0; // 0..4
  int seg = int(floor(s));
  float t = fract(s);
  float brightness;
  if(seg >= 4) brightness = 0.059;
  else if(seg == 0) brightness = mix(0.059, 0.0, t);   // #0f0f0f → noir
  else if(seg == 1) brightness = mix(0.0, 0.059, t);   // noir → #0f0f0f
  else if(seg == 2) brightness = mix(0.059, 0.0, t);   // #0f0f0f → noir
  else brightness = mix(0.0, 0.059, t);                 // noir → #0f0f0f

  // Vignette
  float dist = length(vUv - 0.5);
  float vignette = 1.0 - smoothstep(0.3, 0.85, dist);

  gl_FragColor = vec4(vec3(brightness * vignette), 1.0);
}
</script>

<!-- Glass cube shader -->
<script id="glass-vertex" type="x-shader/x-vertex">
varying vec3 vWorldNormal;
varying vec3 vViewDir;
varying vec4 vScreenPos;
varying vec3 vWorldPos;
varying vec3 vLocalPos;

void main() {
  vLocalPos = position;
  vec4 worldPos = modelMatrix * vec4(position, 1.0);
  vWorldPos = worldPos.xyz;
  vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
  vViewDir = normalize(cameraPosition - worldPos.xyz);

  vec4 mvpPos = projectionMatrix * viewMatrix * worldPos;
  vScreenPos = mvpPos;

  gl_Position = mvpPos;
}
</script>
<script id="glass-fragment" type="x-shader/x-fragment">
precision highp float;

varying vec3 vWorldNormal;
varying vec3 vViewDir;
varying vec4 vScreenPos;
varying vec3 vWorldPos;
varying vec3 vLocalPos;

uniform sampler2D uBackBuffer;
uniform vec2 uResolution;
uniform float uTime;
uniform samplerCube uEnvMap;
uniform vec2 uMouse;
void main() {
  vec3 N = normalize(vWorldNormal);
  vec3 V = normalize(vViewDir);

  vec2 screenUV = (vScreenPos.xy / vScreenPos.w) * 0.5 + 0.5;

  // Fresnel
  float NdotV = max(dot(V, N), 0.0);
  float F = pow(1.0 - NdotV, 5.0) * 0.6 + 0.02;

  // --- Edge proximity (branchless, works on all faces uniformly) ---
  vec3 ap = abs(vLocalPos) / 0.6;
  float mx = max(ap.x, max(ap.y, ap.z));
  float mn = min(ap.x, min(ap.y, ap.z));
  float md = ap.x + ap.y + ap.z - mx - mn;
  float edgeProx = max(md, mn);
  float edgeWarp = pow(edgeProx, 2.5);

  // --- Refraction ---
  vec3 refracted = refract(-V, N, 1.0 / 1.5);
  vec2 baseDistortion = refracted.xy * 0.15;
  vec2 distortion = baseDistortion * (1.0 + edgeWarp * 1.8);

  // Chromatic aberration
  float spread = 0.002 + 0.006 * edgeWarp;
  vec2 offR = distortion + normalize(distortion + 0.001) * spread;
  vec2 offG = distortion;
  vec2 offB = distortion - normalize(distortion + 0.001) * spread;

  // Blur radius
  float blurSize = 0.004 + 0.014 * edgeWarp;

  // Poisson disc 37-tap blur
  vec3 refractedColor = vec3(0.0);
  float totalWeight = 0.0;
  vec2 baseUV = screenUV + distortion;

  vec2 poissonDisc[37];
  poissonDisc[0] = vec2(0.0, 0.0);
  poissonDisc[1] = vec2(0.2695, 0.1472);
  poissonDisc[2] = vec2(-0.1534, 0.2910);
  poissonDisc[3] = vec2(-0.3150, -0.0983);
  poissonDisc[4] = vec2(0.0721, -0.3113);
  poissonDisc[5] = vec2(0.4105, -0.1680);
  poissonDisc[6] = vec2(-0.4520, 0.1890);
  poissonDisc[7] = vec2(0.1440, 0.4660);
  poissonDisc[8] = vec2(-0.2100, -0.4370);
  poissonDisc[9] = vec2(0.4870, 0.2530);
  poissonDisc[10] = vec2(-0.5140, -0.2450);
  poissonDisc[11] = vec2(0.3470, 0.4510);
  poissonDisc[12] = vec2(-0.0510, 0.5730);
  poissonDisc[13] = vec2(-0.4270, -0.4490);
  poissonDisc[14] = vec2(0.5680, -0.0230);
  poissonDisc[15] = vec2(-0.5940, 0.0160);
  poissonDisc[16] = vec2(0.0050, -0.5870);
  poissonDisc[17] = vec2(0.3470, -0.4540);
  poissonDisc[18] = vec2(-0.3060, 0.5380);
  poissonDisc[19] = vec2(0.6170, 0.2710);
  poissonDisc[20] = vec2(-0.6530, -0.1220);
  poissonDisc[21] = vec2(0.5300, -0.3800);
  poissonDisc[22] = vec2(-0.5430, 0.4110);
  poissonDisc[23] = vec2(0.1820, -0.6700);
  poissonDisc[24] = vec2(0.5430, 0.5010);
  poissonDisc[25] = vec2(-0.2420, -0.6570);
  poissonDisc[26] = vec2(-0.6880, 0.2990);
  poissonDisc[27] = vec2(0.7150, -0.1630);
  poissonDisc[28] = vec2(-0.1070, 0.7310);
  poissonDisc[29] = vec2(-0.5370, -0.5620);
  poissonDisc[30] = vec2(0.7300, 0.1170);
  poissonDisc[31] = vec2(0.1300, 0.7510);
  poissonDisc[32] = vec2(-0.7350, -0.2810);
  poissonDisc[33] = vec2(0.4090, -0.6230);
  poissonDisc[34] = vec2(-0.6420, 0.5200);
  poissonDisc[35] = vec2(0.6700, -0.4640);
  poissonDisc[36] = vec2(-0.4440, 0.6610);

  for (int i = 0; i < 37; i++) {
    vec2 offset = poissonDisc[i] * blurSize;
    float d = length(poissonDisc[i]);
    float w = exp(-d * d * 2.0);
    refractedColor += texture2D(uBackBuffer, baseUV + offset).rgb * w;
    totalWeight += w;
  }
  refractedColor /= totalWeight;

  // Very subtle chromatic fringe at edges only
  float rShift = texture2D(uBackBuffer, baseUV + normalize(distortion + 0.001) * spread).r;
  float bShift = texture2D(uBackBuffer, baseUV - normalize(distortion + 0.001) * spread).b;
  refractedColor.r = mix(refractedColor.r, rShift, 0.25 * edgeWarp);
  refractedColor.b = mix(refractedColor.b, bShift, 0.25 * edgeWarp);

  // --- Light & specular ---
  vec3 lightDir = normalize(vec3(-1.0, 1.0, 1.0));
  vec3 H = normalize(V + lightDir);
  float spec = pow(max(dot(N, H), 0.0), 200.0) * 0.8;

  vec3 lightDir2 = normalize(vec3(1.0, -0.5, 0.8));
  vec3 H2 = normalize(V + lightDir2);
  float spec2 = pow(max(dot(N, H2), 0.0), 150.0) * 0.3;

  // --- Reflection: subtle env ---
  vec3 reflected = reflect(-V, N);
  vec3 reflectColor = textureCube(uEnvMap, reflected).rgb * 0.5;

  // --- Edge highlight ---
  float edge = pow(1.0 - NdotV, 3.0) * 0.2;

  // --- Combine ---
  vec3 color = mix(refractedColor, reflectColor, F * 0.3);
  float specTotal = spec + spec2;
  color += vec3(1.0) * specTotal;
  color += vec3(0.7, 0.8, 1.0) * edge;

  // Subtle glow on specular highlights (bloom-like, cube only)
  float glow = pow(specTotal, 0.5) * 0.08;
  color += vec3(0.8, 0.85, 1.0) * glow;

  gl_FragColor = vec4(color, 1.0);
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// --- Setup ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.NoToneMapping;
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

// --- Scenes: one for background, one for cube ---
const bgScene = new THREE.Scene();
const cubeScene = new THREE.Scene();

// --- Click & hold for spherize ---
let isHolding = false;
let spherizeProgress = 0;
let spherizeReleaseTime = 0;
let spherizeAtRelease = 0;
const clickPos = { x: 0.5, y: 0.5 };
window.addEventListener('mousedown', (e) => {
  if (e.target.tagName !== 'A' && e.target.tagName !== 'IMG') {
    isHolding = true;
    clickPos.x = e.clientX / window.innerWidth;
    clickPos.y = 1.0 - (e.clientY / window.innerHeight);
  }
});
window.addEventListener('mouseup', () => { isHolding = false; });

// --- Mouse ---
const mouse = { x: 0, y: 0, smoothX: 0, smoothY: 0 };
window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// --- Trail for water ripple ---
const TRAIL_LENGTH = 20;
const trailPositions = Array.from({ length: TRAIL_LENGTH }, () => new THREE.Vector2(0.5, 0.5));
const trailStrengths = new Array(TRAIL_LENGTH).fill(0.0);
let trailFrameCounter = 0;

// --- Background plane ---
const bgUniforms = {
  uTime: { value: 0 },
  uMouse: { value: new THREE.Vector2(0, 0) },
  uTrailPos: { value: trailPositions },
  uTrailStrength: { value: trailStrengths },
  uSpherize: { value: 0 },
  uCubeScreenPos: { value: new THREE.Vector2(0.5, 0.5) },
};

const bgMaterial = new THREE.ShaderMaterial({
  vertexShader: document.getElementById('bg-vertex').textContent,
  fragmentShader: document.getElementById('bg-fragment').textContent,
  uniforms: bgUniforms,
  depthWrite: false
});

const bgPlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), bgMaterial);
bgPlane.position.z = -6;
bgScene.add(bgPlane);


// --- ULTRANOIR text plane ---
function createTextTexture() {
  const canvas = document.createElement('canvas');
  const ratio = window.innerWidth / window.innerHeight;
  canvas.width = 2048;
  canvas.height = Math.round(2048 / ratio);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 290px "Roboto Condensed", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '-20px';
  ctx.fillText('ULTRANOIR', canvas.width / 2, canvas.height / 2);
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return { texture, ratio: canvas.width / canvas.height };
}

const { texture: textTexture, ratio: textRatio } = createTextTexture();
const textPlaneHeight = 6;
const textPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(textPlaneHeight * textRatio, textPlaneHeight),
  new THREE.MeshBasicMaterial({ map: textTexture, transparent: true, toneMapped: false })
);
textPlane.position.z = -1.5;
bgScene.add(textPlane);

// --- Client hover image plane (behind text, in front of bg) ---
const clientImageUrls = {
  'Dior': 'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=1200&h=675&fit=crop',

  'CNES': 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=1200&h=675&fit=crop',
  'Air Liquide': 'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=1200&h=675&fit=crop',
  'Comme des Garçons': 'https://images.unsplash.com/photo-1558171813-4c088753af8f?w=1200&h=675&fit=crop',
  'Charlemagne': 'https://images.unsplash.com/photo-1582562124811-c09040d0a901?w=1200&h=675&fit=crop',
  'La Cité de la Langue Française': 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1200&h=675&fit=crop',
  'Berluti': 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1200&h=675&fit=crop',
  'Adidas': 'https://images.unsplash.com/photo-1556906781-9a412961c28c?w=1200&h=675&fit=crop',
  'Van Cleef and Arpels': 'https://images.unsplash.com/photo-1515562141589-67f0d569b6f5?w=1200&h=675&fit=crop',
  'Hermès': 'https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=1200&h=675&fit=crop',

// Image plane — 16:9, 64% of visible width at z=-0.5

  const dist = camera.position.z - imgZ;

  const visW = visH * camera.aspect;

const imgSize = getImgPlaneSize();

  transparent: true,
  depthWrite: false,

    uMap: { value: null },

  },
  vertexShader: `
    uniform float uTime;
    varying vec2 vUv;
    varying float vShade;
    void main() {
      vUv = uv;
      vec3 pos = position;

      // Cloth waves — subtle fabric in gentle wind
      float wave1 = sin(pos.x * 3.0 + uTime * 1.2) * 0.03;
      float wave2 = sin(pos.x * 5.0 - uTime * 0.8 + pos.y * 2.0) * 0.02;
      float wave3 = sin(pos.y * 4.0 + uTime * 0.6 + pos.x * 1.5) * 0.015;
      float wave4 = sin(pos.x * 8.0 + pos.y * 6.0 + uTime * 1.5) * 0.008;

      // Displace along Z (depth) for cloth billowing
      pos.z += wave1 + wave2 + wave3 + wave4;

      // Slight XY movement too — cloth sways
      pos.x += sin(pos.y * 2.0 + uTime * 0.7) * 0.008;

    precision highp float;

    uniform float uOpacity;

});

const { texture: section2Texture, ratio: section2Ratio } = createSection2Texture();

// --- Render target for background pass ---

// --- Glass cube with custom shader ---
const cubeGeo = new RoundedBoxGeometry(1.2, 1.2, 1.2, 2, 0.010);

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;

  // Smooth mouse

  if (scrollY > section3Start) {
    const progress = scrollY - section3Start;
    const clientsPerUnit = 0.75;
    const activeIdx = Math.floor(progress * clientsPerUnit);
    const clampedIdx = Math.min(activeIdx, clientNames.length - 1);

    updateBigClientTexture(clientNames[clampedIdx]);
    bigClientMaterial.opacity += (0.9 - bigClientMaterial.opacity) * 0.08;

    // Show client image behind big name
    const activeName = clientNames[clampedIdx];

    if (tex) {
      clientImgMaterial.map = tex;
      clientImgMaterial.needsUpdate = true;
      section3ImgTarget = 1;
    }

    // Sync small client list: scroll up to reveal all names
    const smallLinks = document.querySelectorAll('.client-list a');
    const linkH = 22;
    smallLinks.forEach((link, i) => {
      if (i === clampedIdx) {
        link.style.color = '#fff';
        link.style.opacity = '1';
      } else {
        link.style.color = '#666';
        link.style.opacity = Math.max(0.2, 1 - Math.abs(i - clampedIdx) * 0.15).toString();
      }
    });
    // Scroll the small list up — enough to reveal all names from below viewport
    const smallList = document.querySelector('.client-list');
    const totalListH = smallLinks.length * linkH;
    const viewH = window.innerHeight;
    const scrollRatio = clampedIdx / (clientNames.length - 1);
    // Move list from bottom:-280px upward so active name is visible
    const baseBottom = -280;

    const liftAmount = scrollRatio * maxLift;

  } else {
    bigClientMaterial.opacity += (0 - bigClientMaterial.opacity) * 0.08;
    section3ImgTarget = 0;
    // Reset small list
    const smallLinks = document.querySelectorAll('.client-list a');
    smallLinks.forEach(link => { link.style.color = '#fff'; link.style.opacity = '1'; });
    const smallList = document.querySelector('.client-list');
    if (smallList) smallList.style.bottom = '-280px';
  }


  // Client image fade — combine hover (from small list) and section3 scroll
  const combinedImgTarget = Math.max(clientImgTarget, section3ImgTarget);
  clientImgMaterial.opacity += (combinedImgTarget - clientImgMaterial.opacity) * 0.08;
  clientImgMaterial.uniforms.uTime.value = t;
  clientImgPlane.position.y = 0; // always centered on screen

  // Background uniforms
  bgUniforms.uTime.value = t;
  bgUniforms.uMouse.value.set(mouse.smoothX, mouse.smoothY);
  bgUniforms.uSpherize.value = spherizeProgress;
  const cubeSP = cube.position.clone().project(camera);
  bgUniforms.uCubeScreenPos.value.set(cubeSP.x * 0.5 + 0.5, cubeSP.y * 0.5 + 0.5);

  glassUniforms.uTime.value = t;
  glassUniforms.uMouse.value.set(mouse.smoothX, mouse.smoothY);

  // Cube slow rotation + mouse
  cube.rotation.y = t * 0.15 + mouse.smoothX * 0.8;
  cube.rotation.x = t * 0.1 + mouse.smoothY * 0.6;
  cube.rotation.z = mouse.smoothX * 0.15;
  cube.position.x = mouse.smoothX * 4.5;
  cube.position.y = mouse.smoothY * 3.0;

  // --- Trail for bg water ripple ---
  const cubeWorldPos = new THREE.Vector3();
  cube.getWorldPosition(cubeWorldPos);
  const projected = cubeWorldPos.clone().project(camera);
  const cubeUVx = projected.x * 0.5 + 0.5;
  const cubeUVy = projected.y * 0.5 + 0.5;

  trailFrameCounter++;
  if (trailFrameCounter >= 3) {
    trailFrameCounter = 0;
    for (let i = TRAIL_LENGTH - 1; i > 0; i--) {
      trailPositions[i].copy(trailPositions[i - 1]);
      trailStrengths[i] = trailStrengths[i - 1];
    }
    trailPositions[0].set(cubeUVx, cubeUVy);
    trailStrengths[0] = 1.0;
  }
  for (let i = 0; i < TRAIL_LENGTH; i++) {
    trailStrengths[i] *= 0.96;
  }

  // --- Spherize progress ---
  const spherizeTarget = isHolding ? 0.3 : 0;
  if (isHolding) {
    spherizeProgress += (spherizeTarget - spherizeProgress) * 0.006;
    spherizeReleaseTime = 0;
    spherizeAtRelease = 0;
  } else {
    if (spherizeAtRelease === 0 && spherizeProgress > 0.001) spherizeAtRelease = spherizeProgress;
    if (spherizeAtRelease > 0) {
      spherizeReleaseTime += dt;
      const dur = 0.7;
      const t_rel = Math.min(spherizeReleaseTime / dur, 1.0);
      // Fast return then single soft overshoot
      // Fast return then visible inverse bounce
      let val;
      if (t_rel < 0.5) {
        // Return to 0 in first half
        const t = t_rel / 0.5;
        val = (1.0 - t * t);
      } else {
        // Bounce: go negative (inverse spherize) then back to 0
        const t = (t_rel - 0.5) / 0.5;
        val = -0.12 * Math.sin(t * Math.PI); // -12% overshoot, single arc
      }
      spherizeProgress = spherizeAtRelease * val;
      if (t_rel >= 1.0) { spherizeProgress = 0; spherizeAtRelease = 0; }
    }
  }

  // --- Parallax on hold ---
  const parallaxAmount = spherizeProgress / 0.6; // 0..1

  // 3D text planes — strongest parallax
  const pxText = mouse.smoothX * 0.2 * parallaxAmount;
  const pyText = mouse.smoothY * 0.15 * parallaxAmount;
  textPlane.position.x = pxText;
  section2Plane.position.x = pxText;
  bigClientPlane.position.x = pxText;

  // HTML elements — different layers for depth
  // Content layer (clients, scroll) — medium parallax
  const contentPx = mouse.smoothX * 20 * parallaxAmount;
  const contentPy = -mouse.smoothY * 15 * parallaxAmount;
  const clientList = document.querySelector('.client-list');
  const scrollExplore = document.querySelector('[style*="Spectral"]');
  if (clientList) clientList.style.transform = `translate(${contentPx}px, ${contentPy}px)`;
  if (scrollExplore) {
    scrollExplore.dataset.px = contentPx;
    scrollExplore.dataset.py = contentPy;
    const sm = magOffsets.scroll || {x:0,y:0};
    scrollExplore.style.transform = `translateX(-50%) translate(${contentPx + sm.x}px, ${contentPy + sm.y}px)`;
  }

  // Nav layer (logo, burger) — subtle parallax
  const navPx = mouse.smoothX * 5 * parallaxAmount;
  const navPy = -mouse.smoothY * 4 * parallaxAmount;
  if (navLogo) navLogo.style.transform = `translate(${navPx + magOffsets.logo.x}px, ${navPy + magOffsets.logo.y}px)`;
  if (navBurger) navBurger.style.transform = `translate(${navPx + magOffsets.burger.x}px, ${navPy + magOffsets.burger.y}px)`;

  // --- Rendering ---
  // 1. Background to backBuffer (for glass refraction)
  renderer.setRenderTarget(backBuffer);
  renderer.render(bgScene, camera);

  if (Math.abs(spherizeProgress) > 0.001) {
    // 2. Render full scene to postRT
    renderer.setRenderTarget(postRT);
    renderer.clear();
    renderer.render(bgScene, camera);
    renderer.autoClear = false;
    renderer.render(cubeScene, camera);
    renderer.autoClear = true;

    // 3. Post-process to screen — center on cube
    const cubeScreenPos = cube.position.clone().project(camera);
    const cx = cubeScreenPos.x * 0.5 + 0.5;
    const cy = cubeScreenPos.y * 0.5 + 0.5;
    postUniforms.uStrength.value = spherizeProgress;
    postUniforms.uCenter.value.set(cx, cy);
    renderer.setRenderTarget(null);
    renderer.render(postScene, postCamera);
  } else {
    // No distortion: render directly
    renderer.setRenderTarget(null);
    renderer.render(bgScene, camera);
    renderer.autoClear = false;
    renderer.render(cubeScene, camera);
    renderer.autoClear = true;
  }
}

<script>
// Custom cursor
const cursorDot = document.querySelector('.cursor-dot');
const cursorRing = document.querySelector('.cursor-ring');
let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;
let ringX = cursorX, ringY = cursorY;

document.addEventListener('mousemove', e => {
  cursorX = e.clientX;
  cursorY = e.clientY;
});

// Hover detection on interactive elements
document.addEventListener('mouseover', e => {
  if (e.target.closest('a, .client-link, [data-hover]')) {
    cursorDot.classList.add('hover');
    cursorRing.classList.add('hover');
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('a, .client-link, [data-hover]')) {
    cursorDot.classList.remove('hover');
    cursorRing.classList.remove('hover');
  }
});

// Hold state
document.addEventListener('mousedown', () => {
  cursorDot.classList.add('holding');
  cursorRing.classList.add('holding');
});
document.addEventListener('mouseup', () => {
  cursorDot.classList.remove('holding');
  cursorRing.classList.remove('holding');
});

// Magnetic offsets — shared with animate() loop
const magOffsets = { logo: {x:0,y:0}, burger: {x:0,y:0}, clients: {} };

function animateCursor() {
  requestAnimationFrame(animateCursor);
  cursorDot.style.left = cursorX + 'px';
  cursorDot.style.top = cursorY + 'px';
  ringX += (cursorX - ringX) * 0.12;
  ringY += (cursorY - ringY) * 0.12;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top = ringY + 'px';

  // Magnetic pull helper
  function calcMag(el, strength, radius, offset) {
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = cursorX - cx;
    const dy = cursorY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    let tx = 0, ty = 0;
    if (dist < radius) {
      const pull = (1 - dist / radius) * strength;
      tx = dx * pull;
      ty = dy * pull;
    }
    offset.x += (tx - offset.x) * 0.1;
    offset.y += (ty - offset.y) * 0.1;
  }

  // Logo & burger
  const logo = document.querySelector('img[alt="UN"]');
  const burger = document.querySelector('[style*="flex-direction"]');
  calcMag(logo, 0.35, 150, magOffsets.logo);
  calcMag(burger, 0.35, 150, magOffsets.burger);

  // Scroll to explore
  const scrollEl = document.querySelector('[style*="Spectral"]');
  if (!magOffsets.scroll) magOffsets.scroll = {x:0,y:0};
  calcMag(scrollEl, 0.3, 120, magOffsets.scroll);
  if (scrollEl) {
    const contentPx2 = parseFloat(scrollEl.dataset.px || 0);
    const contentPy2 = parseFloat(scrollEl.dataset.py || 0);
    scrollEl.style.transform = `translateX(-50%) translate(${contentPx2 + magOffsets.scroll.x}px, ${contentPy2 + magOffsets.scroll.y}px)`;
  }

  // Client links
  document.querySelectorAll('.client-link').forEach((el, i) => {
    if (!magOffsets.clients[i]) magOffsets.clients[i] = {x:0,y:0};
    calcMag(el, 0.25, 120, magOffsets.clients[i]);
    el.style.transform = `translate(${magOffsets.clients[i].x}px, ${magOffsets.clients[i].y}px)`;
  });
}
animateCursor();
</script>
</body>
</html>
